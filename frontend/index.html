<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер задач</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Мои задачи</h1>
        <div id="message"></div>
        <div class="filters">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="active">Активные</button>
    <button class="filter-btn" data-filter="done">Выполненные</button>
        </div>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="Введите задачу...">
            <button type="submit">Добавить</button>
        </form>

        <ul id="task-list"></ul>
    </div>

    <template id="task-template">
        <li>
            <span class="task-title"></span>
            <span class="task-status"></span>
            <div class="task-actions">
                <button class="done-btn" title="Сменить статус">✓</button>
                <button class="delete-btn" title="Удалить">✕</button>
            </div>
        </li>
    </template>

    <script src="app.js"></script>
</body>
</html>
